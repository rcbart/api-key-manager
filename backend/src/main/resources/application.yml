spring:
  application:
    name: api-key-manager

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/api_key_manager}
    username: ${DATABASE_USERNAME:api_key_manager}
    password: ${DATABASE_PASSWORD:api_key_manager}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway (below) owns the schema; Hibernate only checks the entities
      # match it. Never "update"/"create" in this app -- see docs/SETUP_GUIDE.md.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.apikeymanager: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"

apikey:
  # Literal prefix every generated key starts with, e.g. "ak_live_3F9aQ2...".
  prefix: ${API_KEY_PREFIX:ak_live_}
  # How many characters of the random portion to also store/display
  # unmasked next to a key's name, so admins can recognize a key in a list
  # without the full secret being retrievable. See docs/SECURITY.md.
  display-suffix-length: 6

jwt:
  # Must be set to a long random value in any non-local environment --
  # the application refuses to start with the insecure default. See
  # docs/SECURITY.md and .env.example.
  secret: ${JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_32_CHARS_MIN}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}

admin:
  bootstrap:
    # Used to create the very first admin account on a fresh database. Only
    # consulted when the admin_users table is empty -- ignored afterward. See
    # docs/SETUP_GUIDE.md.
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}

cors:
  allowed-origins: ${CORS_ORIGIN:http://localhost:5173}
