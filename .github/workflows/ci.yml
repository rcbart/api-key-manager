name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java 17 / Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        working-directory: backend
        run: ./mvnw verify -B
        env:
          # Backend tests use H2 in-memory; no real Postgres required.
          # JWT_SECRET must be at least 32 chars for JwtService startup checks.
          JWT_SECRET: "ci_test_secret_which_is_at_least_32_characters_long"
          ADMIN_USERNAME: ci_admin
          ADMIN_PASSWORD: ci_password_not_used_in_tests

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 22 / Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
